name: Validate canonical OpenAPI spec

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate OpenAPI spec
        run: npm run spec:validate

      - name: Check generated reference is up to date
        run: |
          npm run spec:generate-reference
          git diff --exit-code docs/reference/endpoints.md
